name: atomix
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  youtube_player_iframe: ^6.0.2
  flutter_inappwebview: ^6.1.5
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  image_picker: ^1.1.2
  shared_preferences: ^2.3.0
  audioplayers: ^6.0.0
  webview_flutter: ^4.10.0
  video_player: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/
